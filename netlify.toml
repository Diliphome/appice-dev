[build]
  publish = "."

# ── Cache headers ─────────────────────────────────────────────────────
# Static immutable assets: 1 year cache. Bust by versioning the URL
# (e.g. css/docs.css?v=2 — already in use).
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# OpenAPI spec + Postman collection — shorter cache so devs always
# pull the latest reference.
[[headers]]
  for = "/openapi/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/postman/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Access-Control-Allow-Origin = "*"

# Sitemap and robots: short cache so changes propagate.
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# HTML pages: revalidate frequently so updates show up quickly,
# but allow brief CDN cache for performance.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

# Pretty URLs — let /sdk/ios/ resolve to /sdk/ios/index.html etc.
[[redirects]]
  from = "/sdk"
  to = "/sdk/index.html"
  status = 200

[[redirects]]
  from = "/api"
  to = "/api/index.html"
  status = 200

[[redirects]]
  from = "/guides"
  to = "/guides/index.html"
  status = 200

# 301 redirects: legacy /quickstart/<sdk>.html URLs (used by the
# initial dev-portal starter) → canonical /sdk/<sdk>/quickstart.html.
# Keeps any external link to the older URL pattern alive.
[[redirects]]
  from = "/quickstart/ios.html"
  to = "/sdk/ios/quickstart.html"
  status = 301
[[redirects]]
  from = "/quickstart/android.html"
  to = "/sdk/android/quickstart.html"
  status = 301
[[redirects]]
  from = "/quickstart/web.html"
  to = "/sdk/web/quickstart.html"
  status = 301
[[redirects]]
  from = "/quickstart/react-native.html"
  to = "/sdk/react-native/quickstart.html"
  status = 301

# Custom 404 page (the imported 404.html).
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
