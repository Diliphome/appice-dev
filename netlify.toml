[build]
  publish = "."

# ── Cache headers ─────────────────────────────────────────────────────
# Static immutable assets: 1 year cache. Bust by versioning the URL
# (e.g. css/docs.css?v=2 — already in use).
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Sitemap and robots: short cache so changes propagate.
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# HTML pages: revalidate frequently so updates show up quickly,
# but allow brief CDN cache for performance.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

# Pretty URLs — let /sdk/ios/ resolve to /sdk/ios/index.html etc.
[[redirects]]
  from = "/sdk"
  to = "/sdk/index.html"
  status = 200

[[redirects]]
  from = "/api"
  to = "/api/index.html"
  status = 200

[[redirects]]
  from = "/guides"
  to = "/guides/index.html"
  status = 200
